<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>セッションタイムアウト</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
</head>
<body class="bg-light">
  <div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm text-center" style="width: 400px;">
      <div class="card-body p-5">
        <i class="bi bi-clock-history text-warning fs-1"></i>
        <h5 class="card-title mt-3">セッションがタイムアウトしました</h5>
        <p class="card-text text-muted">
          一定時間操作がなかったため、セッションが終了しました。<br />
          再度ログインしてください。
        </p>
        {# db パターン  : url_for('auth.login')
           ORM パターン : url_for('auth_orm.login')  ← ここだけ違う #}
        <a href="{{ url_for('auth_orm.login') }}" class="btn btn-primary mt-2">
          ログイン画面へ
        </a>
      </div>
    </div>
  </div>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmfKmLT7y9iA2lBR8iJuSvzALVC+"
    crossorigin="anonymous"
  ></script>
</body>
</html>
