<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}エラー{% endblock %} - 労務費管理システム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center" style="max-width: 480px; width: 100%; padding: 2rem;">
    <div class="mb-3" style="font-size: 4rem; line-height: 1;">
      {% block icon %}<i class="bi bi-exclamation-triangle text-warning"></i>{% endblock %}
    </div>
    <h1 class="display-1 fw-bold text-muted mb-0">{% block code %}{% endblock %}</h1>
    <h2 class="h4 fw-semibold mb-3">{% block heading %}{% endblock %}</h2>
    <p class="text-muted mb-4">{% block message %}{% endblock %}</p>
    <div class="d-flex gap-2 justify-content-center">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary">
        <i class="bi bi-house"></i> ホームへ戻る
      </a>
      <button onclick="history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> 前のページ
      </button>
    </div>
    <p class="text-muted mt-4 small">労務費管理システム</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
