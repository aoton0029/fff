{# 労務費トランモーダル — 地区選択テーブル #}
{% if districts %}
<form method="POST" action="{{ url_for('main.ouen_labor_tran_generate') }}" id="labor-tran-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <p class="text-muted small mb-2">
    取込済みの応援連絡票に含まれる地区を選択して、労務費トランを生成します。<br>
    <span class="text-danger fw-bold">※ 集計ロジックは未実装です。現在はモックファイルが出力されます。</span>
  </p>
  <div class="table-responsive">
    <table class="table table-sm table-hover align-middle mb-0">
      <thead class="table-light sticky-top">
        <tr>
          <th class="text-center" style="width:48px">
            <input class="form-check-input" type="checkbox" id="labor-tran-check-all" title="全選択">
          </th>
          <th>地区コード</th>
          <th>地区名</th>
        </tr>
      </thead>
      <tbody>
        {% for d in districts %}
        <tr>
          <td class="text-center">
            <input class="form-check-input labor-tran-check" type="checkbox"
                   name="district_codes" value="{{ d.code }}">
          </td>
          <td>{{ d.code }}</td>
          <td>{{ d.name if d.name else '—' }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="mt-3 d-flex justify-content-end">
    <button type="submit" class="btn btn-primary" id="labor-tran-submit">
      <i class="bi bi-file-earmark-excel me-1"></i>労務費トラン生成
    </button>
  </div>
</form>

<script>
(function () {
  var checkAll = document.getElementById('labor-tran-check-all');
  var form = document.getElementById('labor-tran-form');

  checkAll.addEventListener('change', function () {
    form.querySelectorAll('.labor-tran-check').forEach(function (cb) {
      cb.checked = checkAll.checked;
    });
  });

  // 個別チェックが変わったとき「全選択」の状態を同期する
  form.addEventListener('change', function (e) {
    if (!e.target.classList.contains('labor-tran-check')) return;
    var all = form.querySelectorAll('.labor-tran-check');
    var checked = form.querySelectorAll('.labor-tran-check:checked');
    checkAll.indeterminate = checked.length > 0 && checked.length < all.length;
    checkAll.checked = checked.length === all.length;
  });

  // 0件選択での送信を防ぐ
  form.addEventListener('submit', function (e) {
    var checked = form.querySelectorAll('.labor-tran-check:checked');
    if (checked.length === 0) {
      e.preventDefault();
      alert('地区を1件以上選択してください。');
    }
  });
}());
</script>
{% else %}
<p class="text-muted text-center py-4">
  <i class="bi bi-inbox me-1"></i>取込済みの応援連絡票がありません。先にファイルをアップロードしてください。
</p>
{% endif %}
