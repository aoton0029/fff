    - {label: 合計_明細1_本給,             field: honkyu,                      type: int,   required: true}
    - {label: 合計_明細1_能力給,           field: nouryoku_kyu,                type: int,   required: true}
    - {label: 合計_明細1_職務役割給,       field: shokumu_yakuwari_kyu,        type: int,   required: true}
    - {label: 合計_明細1_役割業績給,       field: yakuwari_gyoseki_kyu,        type: int,   required: true}
    - {label: 合計_明細1_報酬,             field: hoshu,                       type: int,   required: true}
    - {label: 合計_明細1_本俸,             field: honpo,                       type: int,   required: true}
    - {label: 合計_明細1_基本賃金,         field: kihon_chingin,               type: int,   required: true}
    - {label: 合計_明細1_国内給与,         field: kokunai_kyuyo,               type: int,   required: true}
    - {label: 合計_明細1_駐在員給与調整,   field: chuzaiin_kyuyo_chosei,       type: int,   required: true}
    - {label: 合計_明細1_家族手当,         field: kazoku_teate,                type: int,   required: true}
    - {label: 合計_明細1_資格手当,         field: shikaku_teate,               type: int,   required: true}
