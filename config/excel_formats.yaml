    - {label: 合計_明細1_早出残業手当,     field: hayade_zangyou_teate,        type: int,   required: true}
    - {label: 合計_明細1_休日出勤手当,     field: kyujitsu_shukkin_teate,      type: int,   required: true}
    - {label: 合計_明細1_特定休日出勤手当, field: tokutei_kyujitsu_shukkin_teate, type: int, required: true}
