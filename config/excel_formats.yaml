    - {label: 合計_明細1_深夜業手当,       field: shinya_teate,                type: int,   required: true}
    - {label: 合計_明細1_単身赴任手当,     field: tanshin_funin_teate,         type: int,   required: true}
    - {label: 合計_明細1_一時帰省旅費,     field: ichiji_kisei_ryohi,          type: int,   required: true}
    - {label: 合計_明細1_夜間呼出手当,     field: yakan_yobidate_teate,        type: int,   required: true}
