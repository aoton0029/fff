    - {label: 合計_明細2_人件費人数会計,   field: jinkenhi_ninzuu_kaikei,      type: int,   required: true}

ouen:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 送り出し_地区,    field: from_district,     type: str,  required: true}
    - {label: 送り出し_課コード, field: from_section_code, type: str,  required: true}
    - {label: 受け入れ_地区,    field: to_district,       type: str,  required: true}
    - {label: 受け入れ_課コード, field: to_section_code,   type: str,  required: true}
    - {label: 出課日,           field: departure_date,    type: date}
    - {label: 帰課日,           field: return_date,       type: date}
    - {label: 日数,             field: days,              type: int,  required: true}
    - {label: 延日数,           field: extended_days,     type: int,  required: true}
    - {label: 備考,             field: note,              type: str}

allocation:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 事業部,  field: division_code,  type: str,   required: true}
    - {label: 地区,    field: district_code,  type: str,   required: true}
    - {label: 課コード, field: section_code,   type: str,   required: true}
    - {label: 原価区分, field: cost_category,  type: str,   required: true}
    - {label: 工程,    field: process_code,   type: str,   required: true}
    - {label: 日数,    field: days,           type: float, required: true}
    - {label: 工程名,  field: process_name,   type: str}
    - {label: 編成,    field: formation,      type: float, required: true}
    - {label: 固定,    field: fixed_count,    type: float, required: true}

labor_transfer:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 勘定科目コード, field: account_code,       type: str,   required: true}
    - {label: 原価センタ,     field: cost_center,        type: str}
    - {label: 負担課,        field: burden_section,     type: str}
    - {label: 担当課,        field: charge_section,     type: str,   required: true}
    - {label: 工事名,        field: construction_name,  type: str}
    - {label: 作業時間,      field: work_hours,         type: float, required: true}
    - {label: WBS,           field: wbs,                type: str}
    - {label: 資産集約番号,  field: asset_number,       type: str}
    - {label: 指図,          field: order_number,       type: str}
    - {label: 備考,          field: note,               type: str}

department:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 行ラベル,        field: department_code,  type: str, required: true}
    - {label: 行名,            field: department_name,  type: str, required: true}
    - {label: 地区コード,      field: district_code,    type: str, required: true}
    - {label: 課コード,        field: section_code,     type: str, required: true}
    - {label: 集約課コード,    field: agg_section_code, type: str, required: true}
    - {label: 区分コード,      field: kbn_code,         type: str, required: true}
    - {label: 勘定科目コード,  field: account_code,     type: str, required: true}
    - {label: 原価センタコード, field: cost_center_code, type: str, required: true}

section:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 課コード,        field: section_code,     type: str, required: true}
    - {label: 課名,            field: section_name,     type: str, required: true}
    - {label: 地区コード,      field: district_code,    type: str, required: true}
    - {label: 原価センタコード, field: cost_center_code, type: str, required: true}

district:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 地区コード, field: district_code, type: str, required: true}
    - {label: 地区名,     field: district_name, type: str, required: true}

kbn:
  sheet: Sheet1
  header_row: 1
  columns:
    - {label: 区分コード, field: kbn_code,  type: str, required: true}
    - {label: 区分名,     field: kbn_name,  type: str, required: true}
